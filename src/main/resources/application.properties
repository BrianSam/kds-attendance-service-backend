spring.application.name=kds-attendance-service-backend

#db deatils

spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRY}
file.upload-dir=${user.home}/kdsAttendancePhotos
file.base-url=http://192.168.29.145:8080

# Allow large enough file uploads for photos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB